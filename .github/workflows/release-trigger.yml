name: Trigger on New Release

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # 매일 00:00에 실행하도록 예약

jobs:
  check-new-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get current time
        id: current_time
        run: echo "time=$(date -u +%FT%TZ)" >> $GITHUB_OUTPUT
        
      - name: Get latest release
        id: get_release
        shell: bash
        run: |
          latest_release=$(curl -s https://api.github.com/repos/anddea/revanced-patches/releases/latest | jq -r '.published_at')
          echo "latest_release=$latest_release" >> $GITHUB_OUTPUT

      - name: Compare times
        id: compare_times
        run: |
          current_time=$(date -d "${{ steps.current_time.outputs.time }}" +%s)
          latest_release=$(date -d "${{ steps.get_release.outputs.latest_release }}" +%s)
          time_diff=$((current_time - latest_release))
          echo "time_diff=$time_diff" >> $GITHUB_OUTPUT

      - name: Run if within 5 minutes
        if: ${{ steps.compare_times.outputs.time_diff }} <= 300
        shell: bash
        run: |
          echo "New release detected: ${{ steps.get_release.outputs.tag }}"
          # 여기에 작업을 추가합니다.

      - name: Trigger workflow if new release
        if: ${{ steps.compare_times.outputs.time_diff }} <= 300
        uses: ./.github/workflows/build-apk.yml
